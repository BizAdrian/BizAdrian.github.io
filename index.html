<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width-device-wid">
   <title>Platano maduro con salami</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body class="container bg-primary text-white text-center">

    <h1 class="display-1 fw-bold mt-5">¿Quieres ser mi platanita?</h1>

    <img src="Platanitos.jpeg" class="mt-3" style="width: 25%; height: auto;" alt="platanitos">

    <div class="mt-5">
    <button class="btn btn-light btn-lg" onclick="siquiere()">
        Si, acepto :D
    </button>

    <button class="btn btn-danger ms-2 btn-lg" onmouseenter="noquiere(event)">
        No, ni soñando :/
    </button>
    </div>

    <script>
      function noquiere(evt) {
        let target = evt.target;
        let maxWidth = window.innerWidth;
        let maxHeight = window.innerHeight;

        let randomWidth = getRandomInt(0, maxWidth - target.offsetWidth);
        let randomHeight = getRandomInt(0, maxHeight - target.offsetHeight);

        target.style.position = 'absolute';
        target.style.top = randomHeight + 'px';
        target.style.left = randomWidth + 'px';
      }

      function siquiere() {
         alert('Felicidades!, ahora somos platanitos jajajakjajaja');
         localStorage.setItem('respuesta', 'Si, acepto :D');
      }

      function getRandomInt (min, max) {
        return Math.floor (Math.random() * (max - min)) + min;
      }

      </script>
</body>
</html>
